name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build with CMake
      run: |
        New-Item -ItemType Directory -Path "cpp_launcher/build" -Force | Out-Null
        Set-Location cpp_launcher/build
        cmake .. -A x64
        cmake --build . --config Release
        
        Write-Host "=== Build output ==="
        Get-ChildItem Release

    - name: Install Inno Setup
      run: |
        choco install innosetup -y

    - name: Get version
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release Package
      run: |
        cd cpp_launcher
        mkdir -p release
        cd build/Release
        7z a ../../release/OpenClawLauncher-Portable-${{ steps.version.outputs.VERSION }}.zip OpenClawLauncher.exe
        cd ../..
        iscc installer/setup.iss /DMyAppVersion=${{ steps.version.outputs.VERSION }}
        Write-Host "=== Release files ==="
        Get-ChildItem release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenClawLauncher-${{ steps.version.outputs.VERSION }}
        path: |
          cpp_launcher/release/*.exe
          cpp_launcher/release/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Get version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: OpenClawLauncher-${{ steps.version.outputs.VERSION }}
        path: ./release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./release/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
